<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Planner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      .fab {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        text-decoration: none;
      }
      .d-none {
        display: none !important;
      }

      /* Calendar grid */
      .calendar-grid {
        display: grid;
        grid-template-columns: 90px repeat(7, 1fr);
        border-left: 1px solid #dee2e6;
        border-top: 1px solid #dee2e6;
      }
      .calendar-grid .cell {
        border-right: 1px solid #dee2e6;
        border-bottom: 1px solid #dee2e6;
        padding: 8px;
        min-height: 80px;
        font-size: 0.85rem;
      }
      .calendar-grid .cell.header {
        min-height: unset;
        background: #f8f9fa;
        font-weight: 600;
        text-align: center;
        padding: 10px 4px;
        font-size: 0.8rem;
      }
      .calendar-grid .cell.slot-label {
        background: #f8f9fa;
        font-weight: 600;
        color: #6c757d;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 80px;
      }
      .calendar-grid .cell.today-col {
        background: #f0f7ff;
      }
      .meal-chip {
        background: #e7f1ff;
        border: 1px solid #b6d4fe;
        border-radius: 6px;
        padding: 4px 6px;
        font-size: 0.78rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        margin-bottom: 4px;
        cursor: default;
      }
      .meal-chip.cooked {
        background: #d1e7dd;
        border-color: #a3cfbb;
        text-decoration: line-through;
        color: #0f5132;
      }
      .meal-chip .chip-name {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }
      .meal-chip .chip-actions {
        display: flex;
        gap: 2px;
        flex-shrink: 0;
      }
      .chip-btn {
        border: none;
        background: none;
        padding: 0 2px;
        cursor: pointer;
        font-size: 0.75rem;
        line-height: 1;
        color: #6c757d;
      }
      .chip-btn:hover {
        color: #000;
      }
      .add-meal-btn {
        border: none;
        background: none;
        color: #adb5bd;
        font-size: 0.75rem;
        cursor: pointer;
        padding: 2px 0;
        display: block;
        width: 100%;
        text-align: left;
      }
      .add-meal-btn:hover {
        color: #0d6efd;
      }

      /* Shopping list panel */
      #shopping-panel .ingredient-row {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid #f0f0f0;
        font-size: 0.9rem;
      }
      #shopping-panel .ingredient-row:last-child {
        border-bottom: none;
      }
    </style>
  </head>
  <body class="bg-light py-4">
    <div class="container">
      <!-- Header -->
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-3">
          <a
            href="/"
            class="text-decoration-none text-muted d-inline-flex align-items-center gap-1"
          >
            <i class="bi bi-arrow-left"></i> Recipes
          </a>
          <h1 class="mb-0">Meal Planner</h1>
        </div>
        <!-- Week navigation -->
        <div class="d-flex align-items-center gap-2">
          <button
            class="btn btn-outline-secondary btn-sm"
            onclick="shiftWeek(-1)"
          >
            <i class="bi bi-chevron-left"></i>
          </button>
          <button
            class="btn btn-outline-secondary btn-sm"
            onclick="goToToday()"
          >
            Today
          </button>
          <button
            class="btn btn-outline-secondary btn-sm"
            onclick="shiftWeek(1)"
          >
            <i class="bi bi-chevron-right"></i>
          </button>
          <span
            id="week-label"
            class="text-muted ms-1"
            style="font-size: 0.9rem"
          ></span>
        </div>
      </div>

      <!-- Calendar grid (rendered by JS) -->
      <div
        id="calendar-grid"
        class="calendar-grid bg-white shadow-sm rounded mb-4"
      ></div>

      <!-- Shopping list panel -->
      <div id="shopping-panel" class="bg-white rounded shadow-sm p-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h2 class="h5 mb-0"><i class="bi bi-cart3 me-2"></i>Shopping List</h2>
          <div class="d-flex align-items-center gap-2">
            <input
              type="date"
              id="shop-start"
              class="form-control form-control-sm"
              style="width: 145px"
            />
            <span class="text-muted">–</span>
            <input
              type="date"
              id="shop-end"
              class="form-control form-control-sm"
              style="width: 145px"
            />
            <button class="btn btn-primary btn-sm" onclick="loadShoppingList()">
              <i class="bi bi-arrow-clockwise me-1"></i>Generate
            </button>
          </div>
        </div>

        <div id="shop-empty" class="text-center text-muted py-3 d-none">
          <i class="bi bi-cart-x fs-4"></i>
          <p class="mt-2 mb-0">No meals planned for this range.</p>
        </div>
        <div id="shop-error" class="alert alert-danger d-none">
          Could not generate shopping list.
        </div>
        <div id="shop-list"></div>
      </div>
    </div>

    <!-- Modal: pick a recipe for a slot -->
    <div class="modal fade" id="pick-recipe-modal" tabindex="-1">
      <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Choose a Recipe</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body p-0">
            <div
              id="modal-recipe-list"
              class="list-group list-group-flush"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // ----------------------------------------------------------------
      // State
      // ----------------------------------------------------------------
      const SLOTS = ["breakfast", "lunch", "dinner"];
      const DAY_NAMES = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

      let weekStart = getMonday(new Date()); // current week's Monday
      let allRecipes = []; // cached recipe list
      let calendarData = {}; // { "YYYY-MM-DD": { breakfast: entry, ... } }
      let cookedData = {}; // { "YYYY-MM-DD-recipeId": true }

      // Pending slot for modal selection
      let pendingDate = null;
      let pendingSlot = null;

      let pickModal = null;

      // ----------------------------------------------------------------
      // Date helpers
      // ----------------------------------------------------------------
      function getMonday(date) {
        const d = new Date(date);
        const day = d.getDay(); // 0 = Sun
        const diff = day === 0 ? -6 : 1 - day;
        d.setDate(d.getDate() + diff);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function addDays(date, n) {
        const d = new Date(date);
        d.setDate(d.getDate() + n);
        return d;
      }

      function toISO(date) {
        return date.toISOString().slice(0, 10);
      }

      function formatHeader(date) {
        const day = DAY_NAMES[date.getDay() === 0 ? 6 : date.getDay() - 1];
        return `${day}<br><span style="font-weight:400;color:#6c757d;">${date.getDate()}</span>`;
      }

      function isToday(date) {
        return toISO(date) === toISO(new Date());
      }

      // ----------------------------------------------------------------
      // Navigation
      // ----------------------------------------------------------------
      function shiftWeek(delta) {
        weekStart = addDays(weekStart, delta * 7);
        loadWeek();
      }

      function goToToday() {
        weekStart = getMonday(new Date());
        loadWeek();
      }

      function updateWeekLabel() {
        const end = addDays(weekStart, 6);
        const fmt = (d) =>
          d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
        document.getElementById("week-label").textContent = `${fmt(
          weekStart
        )} – ${fmt(end)}`;
      }

      // ----------------------------------------------------------------
      // Load week data
      // ----------------------------------------------------------------
      async function loadWeek() {
        updateWeekLabel();
        const start = toISO(weekStart);
        const end = toISO(addDays(weekStart, 6));

        // Fetch meal plan and cooked log in parallel
        const [planRes, cookedRes] = await Promise.all([
          fetch(`/calendar/entries?start=${start}&end=${end}`),
          fetch(`/calendar/cooked?start=${start}&end=${end}`),
        ]);

        calendarData = {};
        cookedData = {};

        if (planRes.ok) {
          const entries = await planRes.json();
          entries.forEach((e) => {
            if (!calendarData[e.date]) calendarData[e.date] = {};
            calendarData[e.date][e.slot] = e;
          });
        }

        if (cookedRes.ok) {
          const entries = await cookedRes.json();
          entries.forEach((e) => {
            cookedData[`${e.date}-${e.recipe_id}`] = true;
          });
        }

        renderGrid();
        prefillShoppingDates();
      }

      // ----------------------------------------------------------------
      // Render grid
      // ----------------------------------------------------------------
      function renderGrid() {
        const grid = document.getElementById("calendar-grid");
        grid.innerHTML = "";

        const days = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i));

        // Row 1: headers (empty corner + 7 day headers)
        appendCell(grid, "cell header", "");
        days.forEach((d) => {
          const cell = appendCell(
            grid,
            `cell header${isToday(d) ? " today-col" : ""}`,
            ""
          );
          cell.innerHTML = formatHeader(d);
        });

        // Rows 2-4: one row per slot
        SLOTS.forEach((slot) => {
          appendCell(
            grid,
            "cell slot-label",
            slot.charAt(0).toUpperCase() + slot.slice(1)
          );

          days.forEach((d) => {
            const dateStr = toISO(d);
            const cell = appendCell(
              grid,
              `cell${isToday(d) ? " today-col" : ""}`,
              ""
            );
            const entry = calendarData[dateStr]?.[slot];

            if (entry) {
              const recipe = allRecipes.find((r) => r.id === entry.recipe_id);
              const name = recipe ? recipe.name : `Recipe #${entry.recipe_id}`;
              const cooked = !!cookedData[`${dateStr}-${entry.recipe_id}`];
              cell.appendChild(
                makeMealChip(name, dateStr, slot, entry.recipe_id, cooked)
              );
            }

            // "+" button to add/replace
            const addBtn = document.createElement("button");
            addBtn.className = "add-meal-btn";
            addBtn.innerHTML = `<i class="bi bi-plus"></i> add`;
            addBtn.onclick = () => openPickModal(dateStr, slot);
            cell.appendChild(addBtn);
          });
        });
      }

      function appendCell(grid, className, text) {
        const cell = document.createElement("div");
        cell.className = className;
        if (text) cell.textContent = text;
        grid.appendChild(cell);
        return cell;
      }

      function makeMealChip(name, date, slot, recipeId, cooked) {
        const chip = document.createElement("div");
        chip.className = `meal-chip${cooked ? " cooked" : ""}`;
        chip.innerHTML = `
          <span class="chip-name" title="${name}">${name}</span>
          <span class="chip-actions">
            ${
              !cooked
                ? `<button class="chip-btn" title="Mark as cooked" onclick="markCooked('${date}', ${recipeId}, this)">
              <i class="bi bi-check-lg"></i>
            </button>`
                : ""
            }
            <button class="chip-btn text-danger" title="Remove" onclick="removeMeal('${date}', '${slot}')">
              <i class="bi bi-x"></i>
            </button>
          </span>
        `;
        return chip;
      }

      // ----------------------------------------------------------------
      // Pick recipe modal
      // ----------------------------------------------------------------
      function openPickModal(date, slot) {
        pendingDate = date;
        pendingSlot = slot;

        const list = document.getElementById("modal-recipe-list");
        list.innerHTML = "";

        if (allRecipes.length === 0) {
          list.innerHTML = `<div class="p-3 text-muted">No recipes found. <a href="/recipes/new">Add one first.</a></div>`;
        } else {
          allRecipes.forEach((r) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "list-group-item list-group-item-action";
            btn.textContent = r.name;
            btn.onclick = () => planMeal(date, slot, r.id);
            list.appendChild(btn);
          });
        }

        pickModal.show();
      }

      // ----------------------------------------------------------------
      // API actions
      // ----------------------------------------------------------------
      async function planMeal(date, slot, recipeId) {
        pickModal.hide();
        try {
          const res = await fetch("/calendar/entries", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ date, slot, recipe_id: recipeId }),
          });
          if (!res.ok) throw new Error(await res.text());
          await loadWeek();
        } catch (err) {
          console.error("Error planning meal:", err);
          alert("Could not save meal plan.");
        }
      }

      async function removeMeal(date, slot) {
        try {
          const res = await fetch(
            `/calendar/entries?date=${date}&slot=${slot}`,
            {
              method: "DELETE",
            }
          );
          if (!res.ok) throw new Error(await res.text());
          await loadWeek();
        } catch (err) {
          console.error("Error removing meal:", err);
          alert("Could not remove meal.");
        }
      }

      async function markCooked(date, recipeId, btn) {
        btn.disabled = true;
        try {
          const res = await fetch("/calendar/cooked", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ date, recipe_id: recipeId }),
          });
          if (!res.ok) throw new Error(await res.text());
          await loadWeek();
        } catch (err) {
          console.error("Error marking cooked:", err);
          btn.disabled = false;
          alert("Could not mark as cooked.");
        }
      }

      // ----------------------------------------------------------------
      // Shopping list
      // ----------------------------------------------------------------
      function prefillShoppingDates() {
        document.getElementById("shop-start").value = toISO(weekStart);
        document.getElementById("shop-end").value = toISO(
          addDays(weekStart, 6)
        );
      }

      async function loadShoppingList() {
        const start = document.getElementById("shop-start").value;
        const end = document.getElementById("shop-end").value;
        const emptyEl = document.getElementById("shop-empty");
        const errorEl = document.getElementById("shop-error");
        const listEl = document.getElementById("shop-list");

        emptyEl.classList.add("d-none");
        errorEl.classList.add("d-none");
        listEl.innerHTML = "";

        try {
          const res = await fetch(
            `/calendar/shopping-list?start=${start}&end=${end}`
          );
          if (!res.ok) throw new Error(await res.text());
          const ingredients = await res.json();

          if (ingredients.length === 0) {
            emptyEl.classList.remove("d-none");
            return;
          }

          ingredients.forEach((ing) => {
            const row = document.createElement("div");
            row.className = "ingredient-row";
            row.innerHTML = `
              <span>${ing.name}</span>
              <span class="text-muted">${
                ing.quantity % 1 === 0 ? ing.quantity : ing.quantity.toFixed(1)
              } ${ing.unit}</span>
            `;
            listEl.appendChild(row);
          });
        } catch (err) {
          console.error("Error loading shopping list:", err);
          errorEl.classList.remove("d-none");
        }
      }

      // ----------------------------------------------------------------
      // Init
      // ----------------------------------------------------------------
      window.addEventListener("DOMContentLoaded", async () => {
        pickModal = new bootstrap.Modal(
          document.getElementById("pick-recipe-modal")
        );

        // Load recipes once and cache them
        try {
          const res = await fetch("/recipes");
          if (res.ok) allRecipes = await res.json();
        } catch (err) {
          console.error("Could not load recipes:", err);
        }

        await loadWeek();
        loadShoppingList();
      });
    </script>
  </body>
</html>
