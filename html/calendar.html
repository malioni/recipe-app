<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Planner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/calendar.css" />
  </head>
  <body class="bg-light py-4">
    <div class="container">
      <!-- Header -->
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-3">
          <a
            href="/"
            class="text-decoration-none text-muted d-inline-flex align-items-center gap-1"
          >
            <i class="bi bi-arrow-left"></i> Recipes
          </a>
          <h1 class="mb-0">Meal Planner</h1>
        </div>
        <!-- Week navigation -->
        <div class="d-flex align-items-center gap-2">
          <button id="btn-prev-week" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-chevron-left"></i>
          </button>
          <button id="btn-today" class="btn btn-outline-secondary btn-sm">
            Today
          </button>
          <button id="btn-next-week" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-chevron-right"></i>
          </button>
          <span
            id="week-label"
            class="text-muted ms-1"
            style="font-size: 0.9rem"
          ></span>
          <form method="POST" action="/logout" style="margin: 0">
            <button
              type="submit"
              class="btn btn-outline-danger btn-sm d-inline-flex align-items-center gap-1 ms-2"
            >
              <i class="bi bi-box-arrow-right"></i> Sign Out
            </button>
          </form>
        </div>
      </div>

      <!-- Calendar grid (rendered by JS) -->
      <div
        id="calendar-grid"
        class="calendar-grid bg-white shadow-sm rounded mb-4"
      ></div>

      <!-- Shopping list panel -->
      <div id="shopping-panel" class="bg-white rounded shadow-sm p-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h2 class="h5 mb-0"><i class="bi bi-cart3 me-2"></i>Shopping List</h2>
          <div class="d-flex align-items-center gap-2">
            <input
              type="date"
              id="shop-start"
              class="form-control form-control-sm"
              style="width: 145px"
            />
            <span class="text-muted">–</span>
            <input
              type="date"
              id="shop-end"
              class="form-control form-control-sm"
              style="width: 145px"
            />
            <button id="btn-generate-shopping" class="btn btn-primary btn-sm">
              <i class="bi bi-arrow-clockwise me-1"></i>Generate
            </button>
          </div>
        </div>

        <div id="shop-empty" class="text-center text-muted py-3 d-none">
          <i class="bi bi-cart-x fs-4"></i>
          <p class="mt-2 mb-0">No meals planned for this range.</p>
        </div>
        <div id="shop-error" class="alert alert-danger d-none">
          Could not generate shopping list.
        </div>
        <div id="shop-list"></div>
      </div>
    </div>

    <!-- Modal: pick a recipe for a slot -->
    <div class="modal fade" id="pick-recipe-modal" tabindex="-1">
      <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Choose a Recipe</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body p-0">
            <div
              id="modal-recipe-list"
              class="list-group list-group-flush"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/calendar.js"></script>
  </body>
</html>
