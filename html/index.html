<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipes</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      .fab {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        text-decoration: none;
      }
      .recipe-card {
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        text-decoration: none;
        color: inherit;
      }
      .recipe-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12) !important;
      }
      .d-none {
        display: none !important;
      }
    </style>
  </head>
  <body class="bg-light py-4">
    <!-- ======================== LIST VIEW ======================== -->
    <div id="view-list">
      <div class="container">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <h1 class="mb-0">Recipes</h1>
          <span id="recipe-count" class="text-muted"></span>
        </div>

        <div id="list-error" class="alert alert-danger d-none">
          Failed to load recipes. Is the server running?
        </div>

        <div id="empty-state" class="text-center py-5 text-muted d-none">
          <i class="bi bi-journal-x fs-1"></i>
          <p class="mt-3">No recipes yet. Add your first one!</p>
        </div>

        <div id="recipes-grid" class="row g-3"></div>
      </div>

      <!-- FAB: add recipe -->
      <a
        href="/recipes/new"
        class="btn btn-primary fab position-fixed bottom-0 end-0 m-4"
      >
        <i class="bi bi-plus-lg"></i>
      </a>
    </div>

    <!-- ======================== RECIPE VIEW ======================== -->
    <div id="view-recipe" class="d-none">
      <div class="container bg-white p-4 rounded shadow-sm">
        <!-- Back link -->
        <a
          href="#/recipes"
          class="text-decoration-none text-muted d-inline-flex align-items-center gap-1 mb-3"
        >
          <i class="bi bi-arrow-left"></i> All recipes
        </a>

        <h1 id="recipe-name" class="text-center mb-4">Loading...</h1>
        <img
          id="recipe-image"
          src=""
          alt=""
          class="img-fluid rounded mb-4"
          style="display: none"
        />

        <div id="recipe-error" class="alert alert-danger d-none">
          Recipe not found.
        </div>

        <div id="recipe-content">
          <div class="mb-4">
            <h2 class="h4 border-bottom pb-2">Ingredients</h2>
            <ul id="ingredients-list"></ul>
          </div>

          <div>
            <h2 class="h4 border-bottom pb-2">Steps</h2>
            <ol id="instructions-list"></ol>
          </div>
        </div>
      </div>

      <!-- FAB: add recipe -->
      <a
        href="/recipes/new"
        class="btn btn-primary fab position-fixed bottom-0 end-0 m-4"
      >
        <i class="bi bi-plus-lg"></i>
      </a>

      <!-- FAB: edit recipe -->
      <a
        id="edit-button"
        href="#"
        class="btn btn-secondary fab position-fixed bottom-0 start-0 m-4"
        style="display: none; margin-left: 80px !important"
      >
        <i class="bi bi-pencil"></i>
      </a>

      <!-- FAB: delete recipe -->
      <button
        id="delete-button"
        class="btn btn-danger fab position-fixed bottom-0 start-0 m-4"
        style="display: none"
      >
        <i class="bi bi-trash"></i>
      </button>
    </div>

    <script>
      // ----------------------------------------------------------------
      // Router
      // ----------------------------------------------------------------
      function route() {
        const hash = window.location.hash; // e.g. "#/recipes/3"
        const match = hash.match(/^#\/recipes\/(\d+)$/);
        if (match) {
          showRecipeView(parseInt(match[1], 10));
        } else {
          showListView();
        }
      }

      function showListView() {
        document.getElementById("view-list").classList.remove("d-none");
        document.getElementById("view-recipe").classList.add("d-none");
        loadRecipeList();
      }

      function showRecipeView(id) {
        document.getElementById("view-list").classList.add("d-none");
        document.getElementById("view-recipe").classList.remove("d-none");
        loadRecipe(id);
      }

      window.addEventListener("hashchange", route);
      window.addEventListener("DOMContentLoaded", () => {
        if (!window.location.hash) window.location.hash = "#/recipes";
        route();
        document
          .getElementById("delete-button")
          .addEventListener("click", deleteRecipe);
      });

      // ----------------------------------------------------------------
      // List view
      // ----------------------------------------------------------------
      async function loadRecipeList() {
        const grid = document.getElementById("recipes-grid");
        const errorEl = document.getElementById("list-error");
        const emptyEl = document.getElementById("empty-state");
        const countEl = document.getElementById("recipe-count");

        grid.innerHTML = "";
        errorEl.classList.add("d-none");
        emptyEl.classList.add("d-none");

        try {
          const response = await fetch("/recipes");
          if (!response.ok) throw new Error("Server error");
          const recipes = await response.json();

          if (recipes.length === 0) {
            emptyEl.classList.remove("d-none");
            countEl.textContent = "";
            return;
          }

          countEl.textContent = `${recipes.length} recipe${
            recipes.length !== 1 ? "s" : ""
          }`;
          grid.innerHTML = recipes
            .map(
              (recipe) => `
          <div class="col-sm-6 col-md-4 col-lg-3">
            <a href="#/recipes/${
              recipe.id
            }" class="card shadow-sm h-100 recipe-card">
              ${
                recipe.picture
                  ? `<img src="${recipe.picture}" class="card-img-top" alt="${recipe.name}"
                     style="height:160px; object-fit:cover;">`
                  : `<div class="d-flex align-items-center justify-content-center bg-secondary-subtle"
                        style="height:160px;">
                     <i class="bi bi-journal-text text-secondary" style="font-size:2.5rem;"></i>
                   </div>`
              }
              <div class="card-body">
                <h5 class="card-title mb-1">${recipe.name}</h5>
                <small class="text-muted">
                  ${recipe.ingredients.length} ingredient${
                recipe.ingredients.length !== 1 ? "s" : ""
              }
                  &middot;
                  ${recipe.instructions.length} step${
                recipe.instructions.length !== 1 ? "s" : ""
              }
                </small>
              </div>
            </a>
          </div>
        `
            )
            .join("");
        } catch (err) {
          console.error("Error loading recipes:", err);
          errorEl.classList.remove("d-none");
        }
      }

      // ----------------------------------------------------------------
      // Recipe view
      // ----------------------------------------------------------------
      let currentRecipeId = null;

      async function loadRecipe(id) {
        currentRecipeId = null;
        const nameEl = document.getElementById("recipe-name");
        const imgEl = document.getElementById("recipe-image");
        const errorEl = document.getElementById("recipe-error");
        const contentEl = document.getElementById("recipe-content");
        const deleteBtn = document.getElementById("delete-button");

        nameEl.textContent = "Loading...";
        imgEl.style.display = "none";
        errorEl.classList.add("d-none");
        contentEl.classList.remove("d-none");
        deleteBtn.style.display = "none";
        document.getElementById("edit-button").style.display = "none";

        try {
          const response = await fetch(`/recipes/${id}`);
          if (!response.ok) throw new Error("Not found");
          const recipe = await response.json();

          currentRecipeId = id;
          renderRecipe(recipe);
        } catch (err) {
          nameEl.textContent = "Recipe not found";
          contentEl.classList.add("d-none");
          errorEl.classList.remove("d-none");
        }
      }

      function renderRecipe(recipe) {
        document.getElementById("recipe-name").textContent = recipe.name;

        const img = document.getElementById("recipe-image");
        if (recipe.picture) {
          img.src = recipe.picture;
          img.alt = recipe.name;
          img.style.display = "block";
        } else {
          img.style.display = "none";
        }

        const ingredientsList = document.getElementById("ingredients-list");
        ingredientsList.innerHTML = "";
        recipe.ingredients.forEach((ing) => {
          const li = document.createElement("li");
          li.textContent = `${ing.quantity} ${ing.unit} ${ing.name}`;
          ingredientsList.appendChild(li);
        });

        const instructionsList = document.getElementById("instructions-list");
        instructionsList.innerHTML = "";
        recipe.instructions.forEach((step) => {
          const li = document.createElement("li");
          li.textContent = step;
          instructionsList.appendChild(li);
        });

        document.getElementById("delete-button").style.display = "flex";
        const editBtn = document.getElementById("edit-button");
        editBtn.href = `/recipes/edit?id=${recipe.id}`;
        editBtn.style.display = "flex";
      }

      async function deleteRecipe() {
        if (!currentRecipeId) return;
        if (!confirm("Are you sure you want to delete this recipe?")) return;

        try {
          const response = await fetch(`/recipes/${currentRecipeId}/delete`, {
            method: "POST",
          });

          if (response.ok) {
            window.location.hash = "#/recipes";
          } else {
            const errText = await response.text();
            alert("Failed to delete recipe: " + errText);
          }
        } catch (err) {
          console.error("Error deleting recipe:", err);
          alert("Error deleting recipe");
        }
      }
    </script>
  </body>
</html>
