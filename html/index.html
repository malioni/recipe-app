<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipes</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      integrity="sha384-CK2SzKma4jA5H/MXDUU7i1TqZlCFaD4T01vtyDFvPlD97JQyS+IsSh1nI2EFbpyk"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/static/index.css" />
    <script defer src="/static/nav.js"></script>
  </head>
  <body class="bg-light py-4">
    <div id="app-nav"></div>
    <!-- ======================== LIST VIEW ======================== -->
    <div id="view-list">
      <div class="container">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <h1 class="mb-0">Recipes</h1>
          <span id="recipe-count" class="text-muted"></span>
        </div>

        <div id="list-error" class="alert alert-danger d-none">
          Failed to load recipes. Is the server running?
        </div>

        <div id="empty-state" class="text-center py-5 text-muted d-none">
          <i class="bi bi-journal-x fs-1"></i>
          <p class="mt-3">No recipes yet. Add your first one!</p>
        </div>

        <div id="recipes-grid" class="row g-3"></div>
      </div>

      <!-- FAB: add recipe -->
      <a
        href="/recipes/new"
        class="btn btn-primary fab position-fixed bottom-0 end-0 m-4"
      >
        <i class="bi bi-plus-lg"></i>
      </a>
    </div>

    <!-- ======================== RECIPE VIEW ======================== -->
    <div id="view-recipe" class="d-none">
      <div class="container bg-white p-4 rounded shadow-sm">
        <!-- Back link -->
        <a
          href="#/recipes"
          class="text-decoration-none text-muted d-inline-flex align-items-center gap-1 mb-3"
        >
          <i class="bi bi-arrow-left"></i> All recipes
        </a>

        <h1 id="recipe-name" class="text-center mb-4">Loading...</h1>

        <!-- Source link — shown only when the recipe has a source_url -->
        <p id="recipe-source" class="text-center mb-4" style="display: none">
          <a
            id="recipe-source-link"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            class="text-muted small"
          >
            <i class="bi bi-box-arrow-up-right me-1"></i>View original recipe
          </a>
        </p>

        <div id="recipe-error" class="alert alert-danger d-none">
          Recipe not found.
        </div>

        <div id="recipe-content">
          <div class="mb-4">
            <h2 class="h4 border-bottom pb-2">Ingredients</h2>
            <ul id="ingredients-list"></ul>
          </div>

          <div>
            <h2 class="h4 border-bottom pb-2">Steps</h2>
            <ol id="instructions-list"></ol>
          </div>
        </div>
      </div>

      <!-- FAB: add recipe -->
      <a
        href="/recipes/new"
        class="btn btn-primary fab position-fixed bottom-0 end-0 m-4"
      >
        <i class="bi bi-plus-lg"></i>
      </a>

      <!-- FAB: edit recipe -->
      <a
        id="edit-button"
        href="#"
        class="btn btn-secondary fab position-fixed bottom-0 start-0 m-4"
        style="display: none; margin-left: 80px !important"
      >
        <i class="bi bi-pencil"></i>
      </a>

      <!-- FAB: delete recipe -->
      <button
        id="delete-button"
        class="btn btn-danger fab position-fixed bottom-0 start-0 m-4"
        style="display: none"
      >
        <i class="bi bi-trash"></i>
      </button>
    </div>
    <script src="/static/index.js"></script>
  </body>
</html>
