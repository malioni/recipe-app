<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add New Recipe</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      integrity="sha384-CK2SzKma4jA5H/MXDUU7i1TqZlCFaD4T01vtyDFvPlD97JQyS+IsSh1nI2EFbpyk"
      crossorigin="anonymous"
    />
    <script defer src="/static/nav.js"></script>
  </head>
  <body class="bg-light py-4">
    <div id="app-nav"></div>
    <div class="container bg-white p-4 rounded shadow-sm">
      <!-- Back link (edit mode only) -->
      <a
        id="back-link"
        href="/"
        class="text-decoration-none text-muted d-inline-flex align-items-center gap-1 mb-3"
        style="display: none !important"
      >
        <i class="bi bi-arrow-left"></i> Back to recipe
      </a>

      <h1 id="page-title" class="mb-4">Add a New Recipe</h1>

      <!-- Recipe Title -->
      <div class="mb-3">
        <label for="recipe-title" class="form-label">Recipe Title</label>
        <input
          type="text"
          class="form-control"
          id="recipe-title"
          placeholder="Enter recipe name"
          required
        />
      </div>

      <!-- Source URL -->
      <div class="mb-3">
        <label for="recipe-source-url" class="form-label">
          Source URL <span class="text-muted fw-normal">(optional)</span>
        </label>
        <input
          type="url"
          class="form-control"
          id="recipe-source-url"
          placeholder="https://example.com/recipe"
        />
      </div>

      <!-- Ingredients -->
      <div class="mb-4">
        <h2 class="h5">Ingredients</h2>
        <div id="ingredients-list"></div>
        <button
          type="button"
          id="add-ingredient-btn"
          class="btn btn-sm btn-outline-primary mt-2"
        >
          + Add Ingredient
        </button>
      </div>

      <!-- Instructions -->
      <div class="mb-4">
        <h2 class="h5">Steps</h2>
        <div id="steps-list"></div>
        <button
          type="button"
          id="add-step-btn"
          class="btn btn-sm btn-outline-primary mt-2"
        >
          + Add Step
        </button>
      </div>

      <!-- Submit -->
      <button id="submit-btn" class="btn btn-success">
        Save Recipe
      </button>
    </div>

    <script src="/static/add-recipe.js"></script>
  </body>
</html>
