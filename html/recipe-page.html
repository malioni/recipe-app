<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-4">
  <div class="container bg-white p-4 rounded shadow-sm">
    <h1 id="recipe-name" class="text-center mb-4">Loading...</h1>
    <img id="recipe-image" src="" alt="" class="img-fluid rounded mb-4" />

    <div class="mb-4">
      <h2 class="h4 border-bottom pb-2">Ingredients</h2>
      <ul id="ingredients-list"></ul>
    </div>

    <div>
      <h2 class="h4 border-bottom pb-2">Steps</h2>
      <ol id="instructions-list"></ol>
    </div>

    <!-- Temporary option to load another recipe -->
    <div class="mt-4">
		<input type="number" id="recipe-id-input" placeholder="Enter recipe ID" />
		<button onclick="loadRecipe()">Load Recipe</button>
	</div>
  </div>

  <script>
    async function fetchRecipeById(recipeId) {
	  try {
	    const response = await fetch(`/recipes/${recipeId}`);
		if (!response.ok) throw new Error("Recipe not found");
		return await response.json();
	  } catch (error) {
	    console.error("Error fetching recipe:", error);
	    return null;
	  }
	}

    function renderRecipe(recipe) {
	  if (!recipe) {
	    document.getElementById("recipe-name").textContent = "Error loading recipe";
		document.getElementById("recipe-image").style.display = "none";
		return;
	  }

	  document.getElementById("recipe-name").textContent = recipe.name;

	  <!-- const img = document.getElementById("recipe-image"); -->
	  <!-- img.src = recipe.picture; -->
	  <!-- img.alt = recipe.name; -->
	  <!-- img.style.display = "block"; -->

      const ingredientsList = document.getElementById("ingredients-list");
	  ingredientsList.innerHTML = "";
	  recipe.ingredients.forEach(ing => {
	    const li = document.createElement("li");
		li.textContent = `${ing.quantity} ${ing.unit} ${ing.name}`;
		ingredientsList.appendChild(li);
	  });

      const instructionsList = document.getElementById("instructions-list");
	  instructionsList.innerHTML = "";
	  recipe.instructions.forEach(step => {
	    const li = document.createElement("li");
		li.textContent = step;
		instructionsList.appendChild(li);
	  });
	}

    async function loadRecipe() {
	  const input = document.getElementById("recipe-id-input");
	  const recipeId = input.value || 0;
	  const recipe = await fetchRecipeById(recipeId);
	  renderRecipe(recipe);
	}

    // Load the default recipe on page load
	window.addEventListener("DOMContentLoaded", () => {
	  document.getElementById("recipe-id-input").value = 0;
	  loadRecipe();
	});
  </script>

</body>
</html>
